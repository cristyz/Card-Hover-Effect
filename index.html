<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <!-- ADD YOUR LINK [FONT AWESOME] -->
    
    <title>Card Glass</title>
</head>

<body>
    <div class="card-container">
        <div class="top-part">
            <h2>Anna Frey</h2>
            <div class="description">
                <div>
                    <h4>Age</h4>
                    <p>24</p>
                </div>
                <div>
                    <h4>Country</h4>
                    <p>EUA</p>
                </div>
                <div>
                    <h4>City</h4>
                    <p>B.G</p>
                </div>
            </div>
        </div>
        <div class="bottom-part">
            <h3>Photograph</h3>
            <div class="icons">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-linkedin-in"></i>
            </div>
        </div>
    </div>
    <div id="mouse-move"></div>

    <script>
        const div_mouse = document.getElementById('mouse-move')
        window.addEventListener('mousemove', () => {
            div_mouse.style.top = event.clientY + 'px'
            div_mouse.style.left = event.clientX + 'px'
        })
    </script>
</body>

</html>
